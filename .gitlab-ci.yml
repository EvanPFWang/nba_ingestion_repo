stages:
  - test
  - build
  - deploy-infra    #Control plane FIRST
  - deploy-app      #Data plane AFTER infra

variables:
  IMAGE_TAG: ${CI_COMMIT_SHA}  #Immutable tag for production deployments

  AWS_SESSION_DURATION: "900"#Reduced session duration (15 min sufficient for most jobs)
##------------------------------------------------------------------
##Shared AWS OIDC authentication
##
##These anchors define job templates that assume an IAM role via
##GitLab's OpenID Connect integration.  All AWS API calls in the
##pipeline use temporary credentials obtained from the specified
##`ROLE_ARN`.  See the README for variable descriptions.
##------------------------------------------------------------------

.aws_oidc_base: &aws_oidc_base
  image: alpine:3.20
  tags:
    - aws-docker
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: sts.amazonaws.com  #change only if AWS IAM OIDC provider expects a different audience.
  before_script:

.assume_role_script: &assume_role_script
  - apk add --no-cache python3 py3-pip jq coreutils
  - python3 -m pip install --no-cache-dir --quiet awscli
  #Validate required variables before proceeding
  - |
    if [ -z "${ROLE_ARN}" ]; then
      echo "ERROR: ROLE_ARN is not set" >&2
      exit 1
    fi
  #Assume role with proper JSON parsing (avoids word-splitting vulnerability)
  - |
    aws_creds=$(aws sts assume-role-with-web-identity \
      --role-arn "${ROLE_ARN}" \
      --role-session-name "gitlab-${CI_PROJECT_ID}-${CI_PIPELINE_ID}-${CI_JOB_ID}" \
      --web-identity-token "${GITLAB_OIDC_TOKEN}" \
      --duration-seconds "${AWS_SESSION_DURATION}" \
      --output json)

    export AWS_ACCESS_KEY_ID=$(echo "$aws_creds" | jq -r '.Credentials.AccessKeyId')
    export AWS_SECRET_ACCESS_KEY=$(echo "$aws_creds" | jq -r '.Credentials.SecretAccessKey')
    export AWS_SESSION_TOKEN=$(echo "$aws_creds" | jq -r '.Credentials.SessionToken')

    #Clear sensitive data from shell memory
    unset aws_creds
  #Verify credentials work
  - aws sts get-caller-identity --output json | jq '{Account, Arn}'


.aws_oidc:
  <<: *aws_oidc_base
  before_script:
    - *assume_role_script

.docker_aws_oidc:
  <<: *aws_oidc_base
  image: docker:24-cli
  services:
    - docker:24-dind
  variables:
    #TLS ENABLED - fixes insecure channel vulnerability
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_VERIFY: "1"
    DOCKER_CERT_PATH: /certs/client
    DOCKER_TLS_CERTDIR: /certs
  before_script:
    - *assume_role_script

    #assume IAM role using GitLab OIDC token
    #role ARN must be provided via ROLE_ARN CI/CD variable
